<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judo Shodan Mastery Suite</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --dojo-navy: #1f2937;
            --dojo-slate: #f1f5f9;
            --crimson: #c2410c;
            --border: #e2e8f0;
            --text-main: #334155;
            --text-light: #64748b;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--dojo-slate);
            margin: 0;
            padding: 10px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 460px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: var(--dojo-navy);
            color: #ffffff;
            padding: 25px 20px;
            text-align: center;
            border-bottom: 5px solid var(--crimson);
        }
        .header h2 { margin: 0; font-size: 1.6rem; font-weight: 800; }
        .header small { font-size: 0.85rem; opacity: 0.8; font-weight: 500; }

        .tabs {
            display: flex;
            background-color: #f8fafc;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .tab {
            flex: 1;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            color: var(--text-light);
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tab.active {
            background-color: #ffffff;
            color: var(--crimson);
            border-bottom: 3px solid var(--crimson);
        }

        .content { padding: 25px; min-height: 520px; }
        .hidden { display: none; }

        .intro-card {
            background-color: #ffffff;
            border: 2px solid var(--border);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--dojo-navy);
            margin-bottom: 25px;
            min-height: 80px;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
        }
        .options-grid { display: grid; gap: 12px; }
        .option-btn {
            padding: 18px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background-color: #ffffff;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            font-weight: 500;
        }
        .option-btn.correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534; }
        .option-btn.wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }

        .grade-circle { font-size: 4.5rem; font-weight: 900; margin: 20px 0; text-align: center; }

        .group { border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
        .group-title { background-color: #f8fafc; padding: 12px 15px; font-weight: 700; font-size: 0.85rem; color: var(--dojo-navy); border-bottom: 1px solid var(--border); }
        .item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }
        .item input { margin-right: 15px; width: 19px; height: 19px; }

        .search-bar { width: 100%; padding: 12px 15px 12px 40px; border: 2px solid var(--border); border-radius: 10px; box-sizing: border-box; font-size: 1rem; margin-bottom: 20px; }
        
        .glossary-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #f1f5f9; align-items: center; cursor: pointer; }
        .glossary-jp { font-weight: 700; color: var(--crimson); flex: 1; }
        .glossary-en { font-style: italic; font-size: 0.9rem; flex: 1; text-align: right; background: #f1f5f9; padding: 5px 8px; border-radius: 6px; transition: 0.2s; }
        .hidden-text { color: transparent !important; background: #e2e8f0 !important; }

        button.action-btn { width: 100%; padding: 18px; background-color: var(--crimson); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-top: 15px; }
        .footer { text-align: center; padding: 20px; font-size: 0.75rem; color: var(--text-light); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Shodan Master</h2>
        <small>Technical Suite v5.0 (Final Build)</small>
    </div>

    <div class="tabs">
        <div class="tab active" id="tab-quiz" onclick="switchTab('quiz')">Exam</div>
        <div class="tab" id="tab-gokyo" onclick="switchTab('gokyo')">Gokyo</div>
        <div class="tab" id="tab-newaza" onclick="switchTab('newaza')">Newaza</div>
        <div class="tab" id="tab-glossary" onclick="switchTab('glossary')">Study</div>
    </div>

    <div id="quiz-content" class="content">
        <div id="quiz-intro" class="intro-card">
            <h3>Knowledge Mastery</h3>
            <p>Complete randomized exam. All terminology and the full 40-throw Gokyo included.</p>
            <button class="action-btn" onclick="startTest()">Begin Examination</button>
        </div>
        <div id="quiz-playing" class="hidden">
            <div id="q-text" class="question-text"></div>
            <div id="options-box" class="options-grid"></div>
        </div>
        <div id="quiz-results" class="hidden" style="text-align:center;">
            <h2>Final Report</h2>
            <div id="grade-display" class="grade-circle"></div>
            <div id="result-score" style="font-weight:bold;"></div>
            <p id="result-msg"></p>
            <button class="action-btn" onclick="location.reload()">Reset Exam</button>
        </div>
    </div>

    <div id="gokyo-content" class="content hidden"><div id="gokyo-list"></div></div>
    <div id="newaza-content" class="content hidden"><div id="newaza-list"></div></div>
    <div id="glossary-content" class="content hidden">
        <input type="text" id="glossary-search" class="search-bar" placeholder="Search terminology..." onkeyup="filterGlossary()">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button onclick="shuffleGlossary()" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd; background:#fff; cursor:pointer;">Shuffle</button>
            <button onclick="hideAllGlossary()" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd; background:#fff; cursor:pointer;">Hide All</button>
        </div>
        <div id="glossary-list"></div>
    </div>

    <div class="footer">
        Verified USA Judo Technical Standards<br>
        Privacy: Zero data collected. Local use only.
    </div>
</div>

<script>
    const fullBank = [
        { q: "De-ashi-harai", a: "Forward Foot Sweep" },
        { q: "Hiza-guruma", a: "Knee Wheel" },
        { q: "Sasae-tsurikomi-ashi", a: "Propping Drawing Ankle Throw" },
        { q: "Uki-goshi", a: "Floating Hip Throw" },
        { q: "O-soto-gari", a: "Major Outer Reap" },
        { q: "O-goshi", a: "Large Hip Throw" },
        { q: "O-uchi-gari", a: "Major Inner Reap" },
        { q: "Seoi-nage", a: "Shoulder Throw" },
        { q: "Ko-soto-gari", a: "Minor Outer Reap" },
        { q: "Ko-uchi-gari", a: "Minor Inner Reap" },
        { q: "Koshi-guruma", a: "Hip Wheel" },
        { q: "Tsurikomi-goshi", a: "Lifting Pulling Hip Throw" },
        { q: "Okuri-ashi-harai", a: "Following Foot Sweep" },
        { q: "Tai-otoshi", a: "Body Drop" },
        { q: "Harai-goshi", a: "Sweeping Hip Throw" },
        { q: "Uchi-mata", a: "Inner Thigh Throw" },
        { q: "Ko-soto-gake", a: "Minor Outer Hook" },
        { q: "Tsuri-goshi", a: "Lifting Hip Throw" },
        { q: "Yoko-otoshi", a: "Side Drop" },
        { q: "Ashi-guruma", a: "Leg Wheel" },
        { q: "Hane-goshi", a: "Spring Hip Throw" },
        { q: "Harai-tsurikomi-ashi", a: "Sweeping Drawing Ankle Throw" },
        { q: "Tomoe-nage", a: "Circle Throw" },
        { q: "Kata-guruma", a: "Shoulder Wheel" },
        { q: "Sumi-gaeshi", a: "Corner Reversal" },
        { q: "Tani-otoshi", a: "Valley Drop" },
        { q: "Hane-makikomi", a: "Spring Wraparound" },
        { q: "Sukui-nage", a: "Scooping Throw" },
        { q: "Utsuri-goshi", a: "Changing Hip Throw" },
        { q: "O-guruma", a: "Large Wheel" },
        { q: "Soto-makikomi", a: "Outer Wraparound" },
        { q: "Uki-otoshi", a: "Floating Drop" },
        { q: "O-soto-guruma", a: "Major Outer Wheel" },
        { q: "Uki-waza", a: "Floating Throw" },
        { q: "Yoko-wakare", a: "Side Separation" },
        { q: "Yoko-guruma", a: "Side Wheel" },
        { q: "Ushiro-goshi", a: "Rear Hip Throw" },
        { q: "Ura-nage", a: "Rear Throw" },
        { q: "Sumi-otoshi", a: "Corner Drop" },
        { q: "Yoko-gake", a: "Side Hook" },
        { q: "Hadaka-jime", a: "Naked Choke" },
        { q: "Juji-gatame", a: "Cross Armlock" },
        { q: "Sankaku-jime", a: "Triangle Choke" },
        { q: "Kuzushi", a: "Off-balancing" },
        { q: "Tsukuri", a: "Entry / Fitting-in" },
        { q: "Kake", a: "Execution" },
        { q: "Jita Kyoei", a: "Mutual Welfare and Benefit" },
        { q: "Seiryoku Zenyo", a: "Maximum Efficiency" }
    ];

    const lists = {
        gokyo: {
            "Set 1": ["De-ashi-harai", "Hiza-guruma", "Sasae-tsurikomi-ashi", "Uki-goshi", "O-soto-gari", "O-goshi", "O-uchi-gari", "Seoi-nage"],
            "Set 2": ["Ko-soto-gari", "Ko-uchi-gari", "Koshi-guruma", "Tsurikomi-goshi", "Okuri-ashi-harai", "Tai-otoshi", "Harai-goshi", "Uchi-mata"],
            "Set 3": ["Ko-soto-gake", "Tsuri-goshi", "Yoko-otoshi", "Ashi-guruma", "Hane-goshi", "Harai-tsurikomi-ashi", "Tomoe-nage", "Kata-guruma"],
            "Set 4": ["Sumi-gaeshi", "Tani-otoshi", "Hane-makikomi", "Sukui-nage", "Utsuri-goshi", "O-guruma", "Soto-makikomi", "Uki-otoshi"],
            "Set 5": ["O-soto-guruma", "Uki-waza", "Yoko-wakare", "Yoko-guruma", "Ushiro-goshi", "Ura-nage", "Sumi-otoshi", "Yoko-gake"]
        },
        newaza: {
            "Pins": ["Kesa-gatame", "Kata-gatame", "Kami-shiho-gatame", "Yoko-shiho-gatame", "Tate-shiho-gatame"],
            "Chokes": ["Nami-juji-jime", "Hadaka-jime", "Okuri-eri-jime", "Sankaku-jime"],
            "Locks": ["Juji-gatame", "Ude-garami", "Waki-gatame"]
        }
    };

    let pool = []; let idx = 0; let score = 0;
    let currentGlossaryData = [...fullBank];

    function switchTab(t) {
        document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab').forEach(tb => tb.classList.remove('active'));
        document.getElementById(t + '-content').classList.remove('hidden');
        document.getElementById('tab-' + t).classList.add('active');
        if(lists[t]) renderChecklist(lists[t], t + '-list');
        if(t === 'glossary') renderGlossary();
    }

    function renderChecklist(data, id) {
        let h = '';
        for(let s in data) {
            h += `<div class="group"><div class="group-title">${s}</div>`;
            data[s].forEach(i => h += `<div class="item"><input type="checkbox"><span>${i}</span></div>`);
            h += `</div>`;
        }
        document.getElementById(id).innerHTML = h;
    }

    function renderGlossary() {
        let h = '<div class="group">';
        currentGlossaryData.forEach(item => {
            h += `<div class="glossary-item" onclick="this.querySelector('.glossary-en').classList.toggle('hidden-text')">
                    <span class="glossary-jp">${item.q}</span>
                    <span class="glossary-en hidden-text">${item.a}</span>
                  </div>`;
        });
        document.getElementById('glossary-list').innerHTML = h + '</div>';
    }

    function filterGlossary() {
        let val = document.getElementById('glossary-search').value.toLowerCase();
        document.querySelectorAll('.glossary-item').forEach(item => {
            let text = item.innerText.toLowerCase();
            item.style.display = text.includes(val) ? 'flex' : 'none';
        });
    }

    function shuffleGlossary() {
        currentGlossaryData.sort(() => 0.5 - Math.random());
        renderGlossary();
    }

    function hideAllGlossary() {
        document.querySelectorAll('.glossary-en').forEach(el => el.classList.add('hidden-text'));
    }

    function startTest() {
        pool = [...fullBank].sort(() => 0.5 - Math.random()).slice(0, 40);
        idx = 0; score = 0;
        document.getElementById('quiz-intro').classList.add('hidden');
        document.getElementById('quiz-playing').classList.remove('hidden');
        nextQ();
    }

    function nextQ() {
        let d = pool[idx];
        document.getElementById('q-text').innerText = "Translation of: " + d.q;
        let c = [d.a];
        while(c.length < 4) {
            let r = fullBank[Math.floor(Math.random()*fullBank.length)].a;
            if(!c.includes(r)) c.push(r);
        }
        c.sort(() => 0.5 - Math.random());
        let box = document.getElementById('options-box'); box.innerHTML = '';
        c.forEach(opt => {
            let btn = document.createElement('button'); btn.className = 'option-btn';
            btn.innerText = opt; btn.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(b => {
                    b.style.pointerEvents = 'none';
                    if(b.innerText === d.a) b.classList.add('correct');
                });
                if(opt === d.a) score++; else btn.classList.add('wrong');
                setTimeout(() => { idx++; if(idx < 40) nextQ(); else showScore(); }, 1200);
            };
            box.appendChild(btn);
        });
    }

    function showScore() {
        document.getElementById('quiz-playing').classList.add('hidden');
        document.getElementById('quiz-results').classList.remove('hidden');
        let p = (score/40)*100;
        let g = p >= 90 ? "S" : p >= 80 ? "A" : p >= 70 ? "B" : "F";
        let gd = document.getElementById('grade-display'); gd.innerText = g;
        gd.style.color = p >= 80 ? "var(--crimson)" : "var(--dojo-navy)";
        document.getElementById('result-score').innerText = `Final Score: ${score}/40 (${p}%)`;
        document.getElementById('result-msg').innerText = p >= 80 ? "Technical Knowledge Confirmed." : "Study terminology further.";
    }

    // PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js');
        });
    }
</script>
</body>
</html>
